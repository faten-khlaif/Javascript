<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faten Khlaif - Student Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f4f8;
      color: #333;
    }
    nav {
      background-color: #2c3e50;
      padding: 10px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }
    nav a {
      color: #ecf0f1;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 60px 20px;
      margin-top: 50px;
    }
    h1, h2 {
      color: #2c3e50;
    }
    
    /* Gallery Styles */
    .gallery-container {
      display: flex;
      flex-wrap: wrap;
    }
    .gallery-container img {
      max-width: 200px;
      margin: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .gallery-container img:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    form {
      display: flex;
      flex-direction: column;
      max-width: 400px;
    }
    input, textarea {
      margin: 8px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #3498db;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    footer {
      background-color: #2c3e50;
      color: #ecf0f1;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }

    /* --- LIGHTBOX MODAL STYLES --- */
    .lightbox {
      display: none; /* Hidden by default */
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    /* Lightbox Content (Image) */
    .lightbox-content {
      max-width: 85%;
      max-height: 80%;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Navigation Controls */
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.2s;
    }
    .lightbox-close:hover {
      color: #bbb;
    }

    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 50px;
      font-weight: bold;
      padding: 16px;
      cursor: pointer;
      border-radius: 0 3px 3px 0;
      transition: background-color 0.2s, color 0.2s;
    }
    .lightbox-prev {
      left: 10px;
    }
    .lightbox-next {
      right: 10px;
    }
    .lightbox-prev:hover, .lightbox-next:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: #3498db;
    }

    /* Image Caption */
    .lightbox-caption {
      position: absolute;
      bottom: 40px;
      color: #fff;
      font-size: 18px;
      text-align: center;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 16px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#home">Home</a>
    <a href="#pictures">Pictures</a>
    <a href="#video">Video</a>
    <a href="#contact">Contact</a>
  </nav>

  <section id="home">
    <h1>Welcome to Faten Khlaif’s Website</h1>
    <p>Hello! My name is Faten Khlaif. This is my personal student webpage showcasing my work, interests, and ways to connect with me.</p>
  </section>

  <section id="pictures">
    <h2>Gallery</h2>
    <div class="gallery-container">
      <img src="https://via.placeholder.com/600x400/3498db/ffffff?text=Sample+Picture+1" alt="Sample Picture 1">
      <img src="https://via.placeholder.com/600x400/e74c3c/ffffff?text=Sample+Picture+2" alt="Sample Picture 2">
      <img src="https://via.placeholder.com/600x400/2ecc71/ffffff?text=Sample+Picture+3" alt="Sample Picture 3">
    </div>
  </section>

  <section id="video">
    <h2>Featured Video</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      title="YouTube video" frameborder="0" allowfullscreen></iframe>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <form>
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <div id="lightboxModal" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <span class="lightbox-prev">&#10094;</span>
    <img class="lightbox-content" id="lightboxImg" src="" alt="">
    <span class="lightbox-next">&#10095;</span>
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <footer>
    <p>&copy; 2026 Faten Khlaif. All rights reserved.</p>
  </footer>

  <script>
    // Get HTML Elements
    const galleryImages = document.querySelectorAll('.gallery-container img');
    const lightbox = document.getElementById('lightboxModal');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCaption = document.getElementById('lightboxCaption');
    const closeBtn = document.querySelector('.lightbox-close');
    const prevBtn = document.querySelector('.lightbox-prev');
    const nextBtn = document.querySelector('.lightbox-next');
    
    let currentIndex = 0;

    // Function to update Lightbox image and data
    function showImage(index) {
      if (index >= galleryImages.length) {
        currentIndex = 0; // Loop back to the first image
      } else if (index < 0) {
        currentIndex = galleryImages.length - 1; // Loop back to the last image
      } else {
        currentIndex = index;
      }
      
      lightboxImg.src = galleryImages[currentIndex].src;
      lightboxCaption.textContent = galleryImages[currentIndex].alt;
    }

    // Attach click events to gallery images
    galleryImages.forEach((img, index) => {
      img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        showImage(index);
      });
    });

    // Event listener to Close lightbox
    closeBtn.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });

    // Close when clicking outside the image container
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = 'none';
      }
    });

    // Navigation triggers
    nextBtn.addEventListener('click', () => showImage(currentIndex + 1));
    prevBtn.addEventListener('click', () => showImage(currentIndex - 1));

    // Keyboard Arrow Controls
    document.addEventListener('keydown', (e) => {
      if (lightbox.style.display === 'flex') {
        if (e.key === 'ArrowRight') showImage(currentIndex + 1);
        if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
        if (e.key === 'Escape') lightbox.style.display = 'none';
      }
    });
  </script>

</body>
</html>
